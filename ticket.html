<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ticket AZ Turf Pro</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>🎫 Ticket AZ Turf Pro</h1>

<p>Ticket conseillé par l'intelligence AZ</p>

</header>




<nav class="menu">

<a href="index.html">🏠 Accueil</a>

<a href="analyse.html">🔍 Analyse</a>

<a href="ticket.html">🎫 Ticket</a>

<a href="historique.html">📊 Historique</a>

</nav>





<section class="card">


<h2>🎯 Ticket Premium</h2>


<button id="charger">

📥 Charger le ticket

</button>



<div id="ticket">

Aucun ticket disponible.

</div>


</section>





<footer>

AZ Turf Pro © 2026

</footer>





<script>


const API =
"https://az-turf-1.onrender.com/analyse";



document
.getElementById("charger")
.addEventListener("click", async()=>{



const zone =
document.getElementById("ticket");



zone.innerHTML =
"⏳ Chargement du ticket...";



try{



const response =
await fetch(API);



const data =
await response.json();



const ticket =
data.ticket_premium;



zone.innerHTML = `


<div class="cheval">


🏇 Base :

<b>${ticket.base}</b>


<br><br>


⭐ Associés :

<b>${ticket.associes.join(" - ")}</b>


<br><br>


🔥 Outsider :

<b>${ticket.outsider}</b>


<br><br>


🎫 Quinté :

<b>${ticket.quinte.join(" - ")}</b>


</div>



`;



}

catch(error){


zone.innerHTML =
"❌ Impossible de récupérer le ticket.";


}



});



</script>



</body>

</html>
