<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analyse AZ Turf Pro</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>🔍 Analyse AZ Turf Pro</h1>

<p>Classement intelligent des chevaux</p>

</header>



<nav class="menu">

<a href="index.html">🏠 Accueil</a>

<a href="analyse.html">🔍 Analyse</a>

<a href="ticket.html">🎫 Ticket</a>

<a href="historique.html">📊 Historique</a>

</nav>




<section class="card">


<h2>📊 Résultat analyse</h2>


<button id="lancer">

🚀 Lancer l'analyse

</button>



<div id="resultat">

Aucune analyse lancée.

</div>


</section>





<footer>

AZ Turf Pro © 2026

</footer>




<script>


const API = "https://az-turf-1.onrender.com/analyse";



document
.getElementById("lancer")
.addEventListener("click", async()=>{



const zone =
document.getElementById("resultat");



zone.innerHTML =
"⏳ Analyse en cours...";



try{


const response =
await fetch(API);



const data =
await response.json();



let html="";



data.chevaux.forEach(c=>{


html += `

<div class="cheval">

🏇 N°${c.numero}

<br>

Rang : ${c.rang}

<br>

Indice AZ : ${c.indice_az}

<br>

Confiance : ${c.confiance}%

<br>

Type : ${c.type}

</div>

`;


});



zone.innerHTML=html;



}

catch(e){


zone.innerHTML =
"❌ Erreur serveur";


}



});



</script>



</body>

</html>
