<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Historique AZ Turf Pro</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>📊 Historique AZ Turf Pro</h1>

<p>Suivi des analyses précédentes</p>

</header>



<nav class="menu">

<a href="index.html">🏠 Accueil</a>

<a href="analyse.html">🔍 Analyse</a>

<a href="ticket.html">🎫 Ticket</a>

<a href="historique.html">📊 Historique</a>

</nav>




<section class="card">


<h2>📈 Dernières analyses</h2>


<div id="historique">


Aucun historique enregistré.


</div>



</section>




<footer>

AZ Turf Pro © 2026

</footer>




<script>


const historique =
document.getElementById("historique");



let analyses =
JSON.parse(localStorage.getItem("az_historique")) || [];



if(analyses.length === 0){


historique.innerHTML =
"Aucune analyse enregistrée.";


}

else{



historique.innerHTML = "";



analyses.forEach((analyse,index)=>{



historique.innerHTML += `


<div class="cheval">


📅 Analyse ${index + 1}


<br><br>


🎫 Ticket :

${analyse.ticket || "Non disponible"}


<br><br>


⭐ Favori :

${analyse.favori || "Non disponible"}


</div>


`;



});



}



</script>



</body>

</html>
